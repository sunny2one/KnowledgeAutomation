name: Build Knowledge Automation Final

on:
  workflow_dispatch:
  push:
    paths:
      - "KnowledgeAutomationFinal.zip"
      - ".github/workflows/android.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - run: |
          rm -rf project apk-output
          mkdir -p project apk-output
          unzip -q KnowledgeAutomationFinal.zip -d project
      - working-directory: project/SearchBot
        run: gradle assembleDebug
      - working-directory: project/AnswerAssistant
        run: gradle assembleDebug
      - run: |
          cp project/SearchBot/app/build/outputs/apk/debug/app-debug.apk apk-output/KnowledgeSearchBot.apk
          cp project/AnswerAssistant/app/build/outputs/apk/debug/app-debug.apk apk-output/KnowledgeAnswerAssistant.apk
      - uses: actions/upload-artifact@v4
        with:
          name: KnowledgeAutomation-Final-APKs
          path: apk-output/*.apk
          if-no-files-found: error
