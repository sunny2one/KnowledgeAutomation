name: Build Two APKs - One Download

on:
  workflow_dispatch:
  push:
    paths:
      - "KnowledgeAutomationBundle.zip"
      - ".github/workflows/android.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Unzip bundle
        run: |
          rm -rf bundle apk-output
          mkdir -p bundle apk-output
          unzip -q KnowledgeAutomationBundle.zip -d bundle

      - name: Build SearchBot
        working-directory: bundle/SearchBot
        run: gradle assembleDebug

      - name: Build AnswerAssistant
        working-directory: bundle/AnswerAssistant
        run: gradle assembleDebug

      - name: Collect and rename APKs
        run: |
          cp bundle/SearchBot/app/build/outputs/apk/debug/app-debug.apk              apk-output/KnowledgeSearchBot.apk

          cp bundle/AnswerAssistant/app/build/outputs/apk/debug/app-debug.apk              apk-output/KnowledgeAnswerAssistant.apk

          echo "Created APK files:"
          ls -lh apk-output

      - name: Upload both APKs together
        uses: actions/upload-artifact@v4
        with:
          name: KnowledgeAutomation-Two-APKs
          path: apk-output/*.apk
          if-no-files-found: error
          retention-days: 30
